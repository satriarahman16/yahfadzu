<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahfadzu - Aplikasi Muroja'ah Al-Qur'an</title>
    
    <meta name="theme-color" content="#059669">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Yahfadzu">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. CSS VARIABLES (PALET WARNA & UKURAN)
           ========================================= */
        :root {
            /* Colors - Light Mode Defaults */
            --bg-body: #f8fafc;
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --emerald-200: #a7f3d0;
            --emerald-500: #10b981;
            --emerald-600: #059669;
            --emerald-700: #047857;
            --emerald-900: #064e3b;
            --teal-400: #2dd4bf;
            --teal-500: #14b8a6;
            --teal-600: #0d9488;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-400: #94a3b8;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            
            --amber-100: #fef3c7;
            --amber-400: #fbbf24;
            --amber-500: #f59e0b;
            --amber-600: #d97706;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --rose-400: #fb7185;
            --rose-500: #f43f5e;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glass: 0 8px 30px rgba(0,0,0,0.04);
            --shadow-glass-hover: 0 8px 30px rgba(0,0,0,0.08);
            
            /* Fonts */
            --font-ui: 'Poppins', sans-serif;
            --font-arabic: 'Amiri', serif;
        }

        /* --- DARK MODE VARIABLES --- */
        body.dark-mode {
            --bg-body: #0f172a; 
            --slate-50: #1e293b; 
            --slate-100: #334155; 
            --slate-200: #475569; 
            --slate-600: #cbd5e1; 
            --slate-700: #e2e8f0; 
            --slate-800: #f8fafc; 
            
            --emerald-50: rgba(16, 185, 129, 0.1);
            --emerald-100: rgba(16, 185, 129, 0.2);
            
            --shadow-glass: 0 8px 30px rgba(0,0,0,0.4);
            --shadow-glass-hover: 0 8px 30px rgba(0,0,0,0.6);
        }

        /* =========================================
           2. RESET & BASE STYLES
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ui);
            background-color: var(--bg-body);
            color: var(--slate-800);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        ::selection {
            background-color: var(--emerald-200);
            color: var(--emerald-900);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--slate-50); }
        ::-webkit-scrollbar-thumb { background: var(--emerald-500); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--emerald-600); }

        /* =========================================
           3. LAYOUT & UTILITIES
           ========================================= */
        .container {
            width: 100%;
            max-width: 56rem; 
            margin: 0 auto;
            padding: 0 1rem;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hidden { display: none !important; }
        .relative { position: relative; }
        .z-10 { z-index: 10; }
        .text-center { text-align: center; }
        .mt-8 { margin-top: 2rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .text-emerald { color: var(--emerald-600) !important; }
        
        body.dark-mode .text-emerald { color: var(--emerald-500) !important; }

        /* =========================================
           4. BACKGROUND DECORATION
           ========================================= */
        .bg-decoration {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        
        .bg-glow {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 400px;
            background-color: rgba(16, 185, 129, 0.05);
            border-radius: 50%;
            filter: blur(60px);
            transition: background-color 0.3s ease;
        }
        
        body.dark-mode .bg-glow {
            background-color: rgba(16, 185, 129, 0.15);
        }

        /* =========================================
           5. HEADER STYLES
           ========================================= */
        .header {
            background: linear-gradient(to right, var(--emerald-700), var(--emerald-600), var(--teal-600));
            color: white;
            box-shadow: 0 20px 25px -5px rgba(6, 78, 59, 0.05), 0 10px 10px -5px rgba(6, 78, 59, 0.04);
            position: relative;
            z-index: 10;
        }

        .header-content {
            padding: 1.25rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Buttons in Header (Install & Theme) */
        .btn-header-action {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-install-app {
            background: linear-gradient(135deg, var(--amber-400), var(--amber-500));
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px; /* Bentuk Pill/Kapsul modern */
            font-weight: 700;
            font-size: 0.875rem;
            gap: 0.375rem;
            box-shadow: 0 4px 6px -1px rgba(245, 158, 11, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .btn-install-app:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px rgba(245, 158, 11, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.4);
            background: linear-gradient(135deg, #fcd34d, var(--amber-400));
        }

        .btn-install-app i {
            font-size: 1.125rem;
        }
        
        .btn-theme-toggle {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); /* Efek Kaca Buram */
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 2.75rem;
            height: 2.75rem;
            font-size: 1.25rem;
            border-radius: 50%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-theme-toggle:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(15deg) scale(1.05); /* Animasi memutar */
            border-color: rgba(255, 255, 255, 0.4);
        }

        body.dark-mode .btn-theme-toggle {
            background: rgba(15, 23, 42, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
            color: var(--amber-400); /* Ikon Matahari kuning di Dark Mode */
        }

        body.dark-mode .btn-theme-toggle:hover {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fcd34d;
        }

        @media (min-width: 768px) {
            .brand-text h1 { font-size: 1.875rem; }
            .brand-text p { font-size: 0.875rem; }
        }

        /* =========================================
           6. MAIN CONTENT & CARDS
           ========================================= */
        .main-content {
            flex-grow: 1;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-glass);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 1.5rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }

        body.dark-mode .card,
        body.dark-mode .player-card,
        body.dark-mode .modal-content {
            background: rgba(30, 41, 59, 0.85); 
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card:hover { box-shadow: var(--shadow-glass-hover); }

        @media (min-width: 768px) {
            .card { padding: 2rem; }
        }

        /* Setup Area Collapse Animation */
        .setup-area {
            max-height: 1000px;
            opacity: 1;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.4s ease-in-out;
        }

        .setup-area.collapsed {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--slate-100);
        }

        .card-icon {
            background-color: var(--emerald-100);
            color: var(--emerald-600);
            padding: 0.5rem;
            border-radius: 0.75rem;
            font-size: 1.25rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--slate-800);
        }

        /* =========================================
           7. FORMS & INPUTS
           ========================================= */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--slate-700);
        }

        .input-wrapper { position: relative; }

        .input-icon-left {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            padding-left: 0.75rem;
            display: flex;
            align-items: center;
            pointer-events: none;
            color: var(--emerald-500);
            font-size: 1.125rem;
        }

        .input-icon-right {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            padding-right: 0.75rem;
            display: flex;
            align-items: center;
            pointer-events: none;
            color: var(--slate-400);
        }

        .form-control {
            width: 100%;
            border-radius: 0.75rem;
            border: 1px solid var(--slate-200);
            background-color: rgba(248, 250, 252, 0.5);
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--slate-800);
            outline: none;
            transition: all 0.2s;
            appearance: none;
        }
        
        body.dark-mode .form-control {
            background-color: rgba(15, 23, 42, 0.6); 
        }
        
        select.form-control { cursor: pointer; }
        input.form-control { font-weight: 500; }

        .form-control:focus {
            border-color: var(--emerald-500);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            background-color: white;
        }
        
        body.dark-mode .form-control:focus { background-color: #1e293b; }

        .form-control:hover:not(:disabled) { border-color: var(--emerald-400); }

        .form-control:disabled {
            background-color: var(--slate-100);
            color: var(--slate-400);
            cursor: not-allowed;
        }
        
        body.dark-mode .form-control:disabled {
            background-color: rgba(51, 65, 85, 0.5);
            color: #94a3b8; 
        }

        .range-wrapper {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .range-separator {
            color: var(--slate-400);
            font-weight: 700;
        }

        .text-center-input {
            text-align: center;
            padding-left: 1rem;
        }

        /* CUSTOM DROPDOWN (Searchable) */
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 0.5rem);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--emerald-200);
            border-radius: 1rem;
            box-shadow: var(--shadow-lg);
            z-index: 50;
            max-height: 250px;
            overflow-y: auto;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        body.dark-mode .dropdown-menu {
            background: #1e293b;
            border-color: var(--emerald-600);
        }
        
        .dropdown-item {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
            color: var(--slate-700);
            font-weight: 500;
        }
        
        .dropdown-item:hover {
            background-color: var(--emerald-50);
            color: var(--emerald-700);
        }
        
        body.dark-mode .dropdown-item:hover {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--emerald-400);
        }

        /* CUSTOM VOLUME SLIDER */
        .volume-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            background-color: rgba(248, 250, 252, 0.5);
            border: 1px solid var(--slate-200);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            transition: all 0.2s;
        }
        
        body.dark-mode .volume-wrapper { background-color: rgba(15, 23, 42, 0.6); }

        .volume-wrapper:focus-within {
            border-color: var(--emerald-500);
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
            background-color: white;
        }
        
        body.dark-mode .volume-wrapper:focus-within { background-color: #1e293b; }

        .volume-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--slate-200);
            border-radius: 999px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--emerald-500);
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: var(--shadow-sm);
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: var(--emerald-600);
        }

        /* =========================================
           8. BUTTONS
           ========================================= */
        .btn-group {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            border-top: 1px solid var(--slate-100);
            padding-top: 1.5rem;
            transition: all 0.5s ease-in-out;
        }

        .setup-area.collapsed + .btn-group {
            margin-top: 0;
            padding-top: 0;
            border-top-color: transparent;
        }

        @media (min-width: 768px) {
            .btn-group { justify-content: flex-start; }
        }

        .btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            border-radius: 0.75rem;
            font-weight: 700;
            font-family: inherit;
            color: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }

        @media (min-width: 768px) {
            .btn { flex: none; }
        }

        .btn i { font-size: 1.5rem; }

        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Button Variants */
        .btn-primary {
            background: linear-gradient(to right, var(--emerald-600), var(--teal-500));
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:hover:not(:disabled) { background: linear-gradient(to right, var(--emerald-500), var(--teal-400)); }

        .btn-warning {
            background-color: var(--amber-500);
            box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.3);
        }
        .btn-warning:hover { background-color: var(--amber-400); }

        .btn-info {
            background-color: var(--blue-500);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .btn-info:hover { background-color: var(--blue-400); }

        .btn-danger {
            background-color: var(--rose-500);
            box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.3);
        }
        .btn-danger:hover { background-color: var(--rose-400); }

        /* =========================================
           9. PLAYER AREA & DISPLAY
           ========================================= */
        .player-card {
            background-color: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            border: 1px solid rgba(16, 185, 129, 0.2);
            overflow: hidden;
            position: relative;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }

        .player-bg-icon {
            position: absolute;
            top: -2.5rem;
            right: -2.5rem;
            opacity: 0.05;
            pointer-events: none;
            font-size: 12.5rem;
            color: var(--emerald-900);
        }
        
        body.dark-mode .player-bg-icon { color: var(--emerald-500); opacity: 0.03; }

        .progress-bar {
            background: linear-gradient(to right, var(--emerald-50), rgba(20, 184, 166, 0.1));
            padding: 1.25rem;
            border-bottom: 1px solid rgba(16, 185, 129, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .progress-bar {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                padding: 1.25rem 2rem;
            }
        }

        .progress-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .spin-icon-wrapper {
            background: linear-gradient(to bottom right, var(--emerald-500), var(--teal-600));
            color: white;
            width: 3rem;
            height: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }

        .spin-icon {
            font-size: 1.5rem;
            animation: spin 4s linear infinite;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

        .progress-text-label {
            font-size: 0.75rem;
            color: var(--emerald-600);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.125rem;
        }
        
        body.dark-mode .progress-text-label { color: var(--emerald-500); }

        .progress-text-value {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--slate-800);
        }

        .text-slate-muted { font-size: 0.875rem; font-weight: 500; color: var(--slate-400); margin: 0 0.25rem; }
        
        .ayah-position {
            background: rgba(255, 255, 255, 0.6);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            text-align: center;
        }
        
        body.dark-mode .ayah-position { background: rgba(30, 41, 59, 0.6); }

        @media (min-width: 768px) { .ayah-position { text-align: right; } }

        .ayah-position-value {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--slate-700);
        }
        .ayah-position-value span { font-size: 1.25rem; }

        /* Display Content */
        .display-area {
            padding: 1.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        @media (min-width: 768px) { .display-area { padding: 3rem; } }

        .surah-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--emerald-50);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.375rem 1rem;
            border-radius: 9999px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }
        
        .surah-badge span { color: var(--emerald-700); font-weight: 600; font-size: 0.875rem; }
        body.dark-mode .surah-badge span { color: var(--emerald-400); }

        .arabic-text {
            font-family: var(--font-arabic);
            font-size: 2.25rem;
            color: var(--slate-800);
            margin: 1.5rem 0 3rem 0;
            line-height: 2.2 !important;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05));
        }

        /* --- HIGHLIGHT KATA (STABILO AKURAT 100%) --- */
        .word-span {
            border-radius: 0.375rem;
            padding: 0 0.125rem;
            transition: background-color 0.15s ease, color 0.15s ease;
            display: inline-block;
        }
        .word-span.highlighted {
            background-color: var(--emerald-200);
            color: var(--emerald-900);
            box-shadow: 0 0 0 2px var(--emerald-200);
        }
        
        body.dark-mode .word-span.highlighted {
            background-color: var(--emerald-400); 
            color: #064e3b; 
            box-shadow: 0 0 0 2px var(--emerald-400);
        }

        @media (min-width: 768px) {
            .arabic-text { font-size: 3rem; text-align: right; }
        }
        @media (min-width: 1024px) {
            .arabic-text { font-size: 4rem; }
        }

        .translation-box {
            background-color: rgba(248, 250, 252, 0.5);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--slate-100);
        }
        
        body.dark-mode .translation-box { background-color: rgba(15, 23, 42, 0.4); }

        .text-indonesia {
            color: var(--slate-600);
            font-size: 1rem;
            line-height: 1.625;
            font-weight: 500;
        }

        @media (min-width: 768px) { .text-indonesia { font-size: 1.125rem; } }

        /* =========================================
           10. CUSTOM MODAL 
           ========================================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal-content {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 24rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9);
            transition: all 0.3s ease;
            margin: 0 1rem;
        }
        
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        
        .modal-icon {
            width: 4rem; height: 4rem;
            margin: 0 auto 1.5rem auto;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }
        
        .modal-icon.success { background-color: var(--emerald-100); color: var(--emerald-500); }
        .modal-icon.warning { background-color: var(--amber-100); color: var(--amber-500); }
        
        body.dark-mode .modal-icon.success { background-color: rgba(16, 185, 129, 0.2); }
        body.dark-mode .modal-icon.warning { background-color: rgba(245, 158, 11, 0.2); }
        
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--slate-800); margin-bottom: 0.5rem; }
        .modal-text { color: var(--slate-600); margin-bottom: 2rem; line-height: 1.5; }
        
        .modal-btn { 
            width: 100%; 
            padding: 0.875rem; 
            border-radius: 0.75rem; 
            font-weight: 700; 
            color: white; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 1rem; 
        }
        .modal-btn.success { background-color: var(--emerald-500); }
        .modal-btn.success:hover { background-color: var(--emerald-600); }
        .modal-btn.warning { background-color: var(--amber-500); }
        .modal-btn.warning:hover { background-color: var(--amber-600); }

        /* =========================================
           11. FOOTER
           ========================================= */
        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--slate-400);
            font-size: 0.875rem;
            position: relative;
            z-index: 10;
        }
        
        footer p { font-weight: 500; margin-bottom: 0.25rem; }
        footer a { color: var(--emerald-500); font-weight: 600; text-decoration: none; transition: color 0.2s; }
        footer a:hover { color: var(--emerald-600); text-decoration: underline; }

        /* YouTube Subscribe Button */
        .yt-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            background-color: #ef4444; /* Warna merah YouTube */
            color: white !important;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            text-decoration: none !important;
            margin-top: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3);
        }

        .yt-btn:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4);
        }

        .yt-btn i {
            font-size: 1.25rem;
        }

        /* Status Messages */
        .status-msg { padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; text-align: center; transition: all 0.3s ease; }
        .status-error { background-color: #fee2e2; color: #991b1b; }
        
        body.dark-mode .status-error { background-color: rgba(220, 38, 38, 0.2); color: #fca5a5; }
    </style>
</head>
<body>

    <div class="bg-decoration">
        <div class="bg-glow"></div>
    </div>

    <header class="header">
        <div class="container header-content">
            <div class="brand">
                <div class="brand-icon">
                    <i class="ph-fill ph-book-open-text"></i>
                </div>
                <div class="brand-text">
                    <h1>Yahfadzu</h1>
                    <p>Aplikasi Pintar Muroja'ah Al-Qur'an</p>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="btnInstall" class="hidden btn-header-action btn-install-app">
                    <i class="ph-bold ph-download-simple text-lg"></i> Install
                </button>
                
                <button id="btnThemeToggle" class="btn-header-action btn-theme-toggle" aria-label="Toggle Dark Mode">
                    <i class="ph-fill ph-moon" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content container relative z-10">
        
        <div class="card" id="setupCard">
            <div id="setupFormArea" class="setup-area">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="ph-bold ph-sliders-horizontal"></i>
                    </div>
                    <h2 class="card-title">Pengaturan Hafalan</h2>
                </div>
                
                <div class="form-grid">
                    <div class="form-group relative">
                        <label class="form-label">Cari & Pilih Surah</label>
                        <div class="input-wrapper" id="surahSearchContainer">
                            <div class="input-icon-left"><i class="ph-bold ph-magnifying-glass"></i></div>
                            <input type="text" id="surahSearchInput" class="form-control" placeholder="Ketik nama surah..." autocomplete="off">
                            <div class="input-icon-right"><i class="ph-bold ph-caret-down"></i></div>
                            
                            <div id="surahDropdownList" class="dropdown-menu hidden">
                                <div class="dropdown-item text-center">Memuat daftar surah...</div>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Qari (Suara Audio)</label>
                        <div class="input-wrapper">
                            <div class="input-icon-left"><i class="ph-fill ph-headphones"></i></div>
                            <select id="qariSelect" class="form-control">
                                <option value="05|7">Misyari Rasyid Al-Afasi</option>
                                <option value="03|3">Abdurrahman as-Sudais</option>
                                <option value="02|2">Abdul Basit (Murattal)</option>
                                <option value="04|4">Abu Bakr al-Shatri</option>
                                <option value="01|12">Mahmoud Khalil Al-Husary</option>
                            </select>
                            <div class="input-icon-right"><i class="ph-bold ph-caret-down"></i></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Rentang Ayat</label>
                        <div class="range-wrapper">
                            <div class="input-wrapper" style="flex: 1;">
                                <div class="input-icon-left"><i class="ph-fill ph-play-circle"></i></div>
                                <input type="number" id="startAyah" list="ayahOptions" class="form-control text-center-input" placeholder="Mulai" disabled min="1">
                            </div>
                            <span class="range-separator"><i class="ph-bold ph-arrow-right"></i></span>
                            <div class="input-wrapper" style="flex: 1;">
                                <div class="input-icon-left"><i class="ph-fill ph-stop-circle"></i></div>
                                <input type="number" id="endAyah" list="ayahOptions" class="form-control text-center-input" placeholder="Akhir" disabled min="1">
                            </div>
                        </div>
                        <datalist id="ayahOptions"></datalist>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Jumlah Pengulangan (1-100)</label>
                        <div class="input-wrapper">
                            <div class="input-icon-left"><i class="ph-fill ph-arrows-clockwise"></i></div>
                            <input type="number" id="repeatCount" min="1" max="100" value="10" class="form-control">
                        </div>
                    </div>

                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label class="form-label">Volume Audio</label>
                        <div class="volume-wrapper">
                            <i id="volumeIcon" class="ph-fill ph-speaker-high text-emerald" style="font-size: 1.5rem;"></i>
                            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="1">
                            <span id="volumePercentage" style="font-size: 0.875rem; font-weight: 600; color: var(--slate-600); width: 40px; text-align: right;">100%</span>
                        </div>
                    </div>
                </div>
            </div> <div class="btn-group">
                <button id="btnPlay" class="btn btn-primary" disabled>
                    <i class="ph-fill ph-play-circle"></i> Mulai Hafalan
                </button>
                <button id="btnPause" class="btn btn-warning hidden">
                    <i class="ph-fill ph-pause-circle"></i> Jeda
                </button>
                <button id="btnStop" class="btn btn-danger hidden">
                    <i class="ph-fill ph-stop-circle"></i> Berhenti
                </button>
            </div>
        </div>

        <div id="statusMessage" class="status-msg status-error hidden"></div>

        <div id="playerArea" class="player-card hidden">
            <div class="player-bg-icon">
                <i class="ph-fill ph-moon-stars"></i>
            </div>

            <div class="progress-bar">
                <div class="progress-info">
                    <div class="flex-center spin-icon-wrapper">
                        <i class="ph-bold ph-arrows-clockwise spin-icon"></i>
                    </div>
                    <div>
                        <p class="progress-text-label">Pengulangan</p>
                        <p class="progress-text-value">
                            <span id="lblCurrentRepeat" class="text-emerald">0</span> 
                            <span class="text-slate-muted">dari</span> 
                            <span id="lblTotalRepeat">0</span>
                        </p>
                    </div>
                </div>
                <div class="ayah-position">
                    <p class="progress-text-label">Posisi Ayat</p>
                    <p class="ayah-position-value">Ayat <span id="lblCurrentAyah" class="text-emerald">0</span></p>
                </div>
            </div>

            <div class="display-area">
                <div id="ayahContent">
                    <div class="surah-badge">
                        <i class="ph-fill ph-book-open text-emerald"></i>
                        <span>Surah <span id="lblSurahName">...</span> • Ayat <span id="lblAyahNumberInText">0</span></span>
                    </div>
                    
                    <h3 id="teksArab" class="arabic-text" dir="rtl"></h3>
                    
                    <div class="translation-box">
                        <p id="teksIndonesia" class="text-indonesia"></p>
                    </div>
                </div>
            </div>
    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIcon" class="modal-icon"></div>
            <h3 id="modalTitle" class="modal-title"></h3>
            <p id="modalText" class="modal-text"></p>
            <button id="modalBtn" class="modal-btn">Tutup</button>
        </div>
    </div>

    <footer>
        <p>Provided by API <a href="https://quran.com" target="_blank">Quran.com</a></p>
        <a href="https://www.youtube.com/satriarahman" target="_blank" class="yt-btn">
            <i class="ph-fill ph-youtube-logo"></i> Subscribe
        </a>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        // --- State Management ---
        const state = {
            surahList: [],
            currentSurahData: null,
            selectedSurahNumber: null,
            isPlaying: false,
            isPaused: false,
            targetRepeat: 0,
            currentRepeat: 1,
            startAyah: 1,
            endAyah: 1,
            currentAyahPlaying: 1,
            audioElement: new Audio(),
            
            useQuranComData: false, 
            currentAudioSource: 'equran',
            currentFallbackUrl: '',
            currentSegments: null,
            quranComAudioData: null,
            totalWords: 0,
            lastSpokenPos: -1, // Menandai posisi kata Arab terakhir yang dilafazkan
            currentWordPosition: -1
        };

        let animationFrameId = null;

        // --- DOM Elements ---
        const els = {
            setupFormArea: document.getElementById('setupFormArea'),
            surahSearchInput: document.getElementById('surahSearchInput'),
            surahDropdownContainer: document.getElementById('surahSearchContainer'),
            surahDropdownList: document.getElementById('surahDropdownList'),
            qariSelect: document.getElementById('qariSelect'),
            startAyah: document.getElementById('startAyah'),
            endAyah: document.getElementById('endAyah'),
            ayahOptions: document.getElementById('ayahOptions'),
            repeatCount: document.getElementById('repeatCount'),
            
            volumeSlider: document.getElementById('volumeSlider'),
            volumeIcon: document.getElementById('volumeIcon'),
            volumePercentage: document.getElementById('volumePercentage'),
            
            btnPlay: document.getElementById('btnPlay'),
            btnPause: document.getElementById('btnPause'),
            btnStop: document.getElementById('btnStop'),
            btnInstall: document.getElementById('btnInstall'),
            btnThemeToggle: document.getElementById('btnThemeToggle'),
            themeIcon: document.getElementById('themeIcon'),
            
            statusMessage: document.getElementById('statusMessage'),
            playerArea: document.getElementById('playerArea'),
            
            lblCurrentRepeat: document.getElementById('lblCurrentRepeat'),
            lblTotalRepeat: document.getElementById('lblTotalRepeat'),
            lblCurrentAyah: document.getElementById('lblCurrentAyah'),
            lblSurahName: document.getElementById('lblSurahName'),
            lblAyahNumberInText: document.getElementById('lblAyahNumberInText'),
            
            teksArab: document.getElementById('teksArab'),
            teksIndonesia: document.getElementById('teksIndonesia'),
        };

        // --- Initialization ---
        async function init() {
            setupTheme();
            setupPWA();
            try {
                // Mengambil list Surah dari API Quran.com
                const response = await fetch('https://api.quran.com/api/v4/chapters?language=id');
                const result = await response.json();
                
                if (result.chapters) {
                    state.surahList = result.chapters;
                    renderSurahDropdown(state.surahList);
                } else {
                    showError("Gagal memuat daftar Surah dari API Quran.com.");
                }
            } catch (error) {
                showError("Terjadi kesalahan jaringan saat memuat data surah.");
                console.error(error);
            }
            
            state.audioElement.volume = els.volumeSlider.value;
        }

        // --- THEME / MODE GELAP TERANG ---
        function setupTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark-mode');
                els.themeIcon.classList.replace('ph-moon', 'ph-sun');
            } else {
                document.body.classList.remove('dark-mode');
                els.themeIcon.classList.replace('ph-sun', 'ph-moon');
            }

            els.btnThemeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                
                if (isDark) {
                    els.themeIcon.classList.replace('ph-moon', 'ph-sun');
                    localStorage.setItem('theme', 'dark');
                } else {
                    els.themeIcon.classList.replace('ph-sun', 'ph-moon');
                    localStorage.setItem('theme', 'light');
                }
            });
        }

        // --- SETUP PWA & INSTALASI ---
        let deferredPrompt;
        function setupPWA() {
            const pwaIconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" rx="56" fill="#059669"/><path d="M216,40H40A16,16,0,0,0,24,56V200a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V56A16,16,0,0,0,216,40Zm-8,160H48V56H208V200ZM80,104a8,8,0,0,1,8-8h80a8,8,0,0,1,0,16H88A8,8,0,0,1,80,104Zm0,40a8,8,0,0,1,8-8h80a8,8,0,0,1,0,16H88A8,8,0,0,1,80,144Z" fill="#ffffff"/></svg>`;
            const pwaIconUrl = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(pwaIconSvg);

            const manifestObj = {
                name: "Yahfadzu - Hafalan Al-Qur'an",
                short_name: "Yahfadzu",
                description: "Aplikasi Pintar Muroja'ah Al-Qur'an",
                start_url: location.href,
                display: "standalone",
                background_color: "#f8fafc",
                theme_color: "#059669",
                icons: [{ src: pwaIconUrl, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }]
            };

            const manifestBlob = new Blob([JSON.stringify(manifestObj)], { type: 'application/manifest+json' });
            const manifestLink = document.createElement('link');
            manifestLink.rel = 'manifest';
            manifestLink.href = URL.createObjectURL(manifestBlob);
            document.head.appendChild(manifestLink);

            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', (e) => { self.skipWaiting(); });
                    self.addEventListener('activate', (e) => { e.waitUntil(clients.claim()); });
                    self.addEventListener('fetch', (e) => { 
                        e.respondWith(fetch(e.request).catch(() => new Response('Sedang Offline'))); 
                    });
                `;
                const swBlob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW setup skipped.'));
            }

            // Tampilkan tombol instal jika browser memunculkan event install prompt
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                els.btnInstall.classList.remove('hidden');
            });

            // Cek apakah web sudah dibuka dalam mode standalone (sudah diinstall)
            if (window.matchMedia('(display-mode: standalone)').matches) {
                els.btnInstall.classList.add('hidden');
            } else {
                // Sebagai fallback untuk iOS / Browser lain, aktifkan tombol instal untuk instruksi manual
                els.btnInstall.classList.remove('hidden');
            }

            els.btnInstall.addEventListener('click', async () => {
                if (deferredPrompt) {
                    // Panggil prompt instalasi bawaan Chrome/Android
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log(`User response: ${outcome}`);
                    deferredPrompt = null;
                    els.btnInstall.classList.add('hidden');
                } else {
                    // Jika diblokir atau di iOS, tampilkan modal petunjuk
                    showModal('warning', 'Install Aplikasi', 'Untuk memasang aplikasi ini di layar utama Anda:\n\nAndroid (Chrome): Ketuk ikon menu (⋮) lalu pilih "Tambahkan ke Layar Utama".\n\niOS (Safari): Ketuk ikon Share lalu pilih "Tambah ke Layar Utama".');
                }
            });
        }

        // --- Modal Kustom ---
        function showModal(type, title, text, callback) {
            const modal = document.getElementById('customModal');
            const icon = document.getElementById('modalIcon');
            const titleEl = document.getElementById('modalTitle');
            const textEl = document.getElementById('modalText');
            const btn = document.getElementById('modalBtn');
            
            if (type === 'success') {
                icon.className = 'modal-icon success';
                icon.innerHTML = '<i class="ph-bold ph-check"></i>';
                btn.className = 'modal-btn success';
            } else if (type === 'warning') {
                icon.className = 'modal-icon warning';
                icon.innerHTML = '<i class="ph-bold ph-warning"></i>';
                btn.className = 'modal-btn warning';
            }
            
            titleEl.textContent = title;
            textEl.innerText = text;
            modal.classList.add('active');
            
            btn.onclick = () => {
                modal.classList.remove('active');
                if (callback) callback();
            };
        }

        // --- Fitur Pencarian Surah ---
        function renderSurahDropdown(list) {
            els.surahDropdownList.innerHTML = '';
            if (list.length === 0) {
                els.surahDropdownList.innerHTML = '<div class="dropdown-item text-center" style="color: var(--slate-400);">Surah tidak ditemukan</div>';
                return;
            }
            list.forEach(surah => {
                const item = document.createElement('div');
                item.className = 'dropdown-item';
                item.style.display = 'flex';
                item.style.alignItems = 'center';
                item.style.gap = '0.5rem';
                item.innerHTML = `<i class="ph-fill ph-book-open" style="color: var(--emerald-500); font-size: 1.125rem;"></i> <span>${surah.id}. ${surah.name_simple} <span style="color: var(--slate-400); font-size: 0.8rem;">(${surah.verses_count} Ayat)</span></span>`;
                
                item.addEventListener('click', () => handleSurahSelection(surah));
                els.surahDropdownList.appendChild(item);
            });
        }

        els.surahSearchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filteredList = state.surahList.filter(surah => 
                surah.name_simple.toLowerCase().includes(query) || 
                surah.translated_name.name.toLowerCase().includes(query) ||
                surah.id.toString() === query
            );
            renderSurahDropdown(filteredList);
            els.surahDropdownList.classList.remove('hidden');
        });

        els.surahSearchInput.addEventListener('focus', () => {
            if (state.surahList.length > 0) {
                if (els.surahSearchInput.value === '') renderSurahDropdown(state.surahList);
                els.surahDropdownList.classList.remove('hidden');
            }
        });

        document.addEventListener('click', (e) => {
            if (!els.surahDropdownContainer.contains(e.target)) els.surahDropdownList.classList.add('hidden');
        });

        function handleSurahSelection(surah) {
            els.surahSearchInput.value = `${surah.id}. ${surah.name_simple}`;
            els.surahDropdownList.classList.add('hidden');
            
            state.selectedSurahNumber = surah.id;
            state.currentSurahData = surah; 
            
            populateAyahInputs(surah.verses_count);
            
            els.btnPlay.disabled = false;
            els.startAyah.disabled = false;
            els.endAyah.disabled = false;
        }

        // --- Fitur Kontrol Volume ---
        els.volumeSlider.addEventListener('input', (e) => {
            const volumeValue = parseFloat(e.target.value);
            state.audioElement.volume = volumeValue;
            els.volumePercentage.textContent = Math.round(volumeValue * 100) + '%';
            
            let iconClass = 'ph-speaker-high';
            if (volumeValue === 0) iconClass = 'ph-speaker-none';
            else if (volumeValue < 0.4) iconClass = 'ph-speaker-low';
            els.volumeIcon.className = `ph-fill ${iconClass} text-emerald`;
        });

        // --- Validasi Rentang Ayat ---
        els.startAyah.addEventListener('input', () => {
            let start = parseInt(els.startAyah.value);
            let max = parseInt(els.startAyah.max);
            if (!isNaN(start) && start >= 1 && start <= max) {
                els.endAyah.min = start;
            }
        });

        els.startAyah.addEventListener('change', () => {
            let start = parseInt(els.startAyah.value);
            let end = parseInt(els.endAyah.value);
            let max = parseInt(els.startAyah.max);
            
            if (isNaN(start) || start < 1) start = 1;
            if (start > max) start = max;
            
            els.startAyah.value = start;
            els.endAyah.min = start; 
            if (start > end) els.endAyah.value = start;
        });

        els.endAyah.addEventListener('change', () => {
            let start = parseInt(els.startAyah.value);
            let end = parseInt(els.endAyah.value);
            let max = parseInt(els.endAyah.max);
            
            if (isNaN(end) || end < start) end = start; 
            if (end > max) end = max;
            
            els.endAyah.value = end;
        });

        // --- Kontrol Pemutar ---
        els.btnPlay.addEventListener('click', startMemorization);
        els.btnPause.addEventListener('click', () => {
            if (state.isPlaying && !state.isPaused) {
                state.audioElement.pause();
                state.isPaused = true;
                els.btnPause.className = 'btn btn-info';
                els.btnPause.innerHTML = '<i class="ph-fill ph-play-circle"></i> Lanjutkan';
                els.setupFormArea.classList.remove('collapsed');
            } else if (state.isPlaying && state.isPaused) {
                const playPromise = state.audioElement.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        if (animationFrameId) cancelAnimationFrame(animationFrameId);
                        animationFrameId = requestAnimationFrame(updateHighlight);
                    }).catch(e => {
                        if (e.name !== 'AbortError') console.error("Play Promise error:", e);
                    });
                }
                state.isPaused = false;
                els.btnPause.className = 'btn btn-warning';
                els.btnPause.innerHTML = '<i class="ph-fill ph-pause-circle"></i> Jeda';
                els.setupFormArea.classList.add('collapsed');
            }
        });
        els.btnStop.addEventListener('click', stopMemorization);

        // --- ALGORITMA INTERPOLASI KATA YANG HILANG ---
        function interpolateMissingSegments(rawSegments, lastSpokenPos) {
            // 1. Batasi posisi segment agar tidak melampaui lastSpokenPos (menghindari simbol akhir ayat memakan durasi)
            // dan gabungkan segment yang memiliki posisi yang sama akibat pembatasan ini.
            let cappedSegments = [];
            for (let i = 0; i < rawSegments.length; i++) {
                let s = [...rawSegments[i]];
                if (s[0] > lastSpokenPos) {
                    s[0] = lastSpokenPos;
                }
                let prev = cappedSegments[cappedSegments.length - 1];
                if (prev && prev[0] === s[0]) {
                    prev[2] = Math.max(prev[2], s[2]); // Perpanjang waktu akhir kata jika tergabung
                } else {
                    cappedSegments.push(s);
                }
            }

            // 2. Interpolasi (membagi rata) waktu jika ada kata yang terlewat
            let fixedSegments = [];
            for (let i = 0; i < cappedSegments.length; i++) {
                let curr = cappedSegments[i];
                let next = cappedSegments[i+1];
                let targetPos;

                if (next && next[0] > curr[0]) {
                    targetPos = next[0] - 1;
                } else if (!next) {
                    targetPos = lastSpokenPos;
                } else {
                    targetPos = curr[0]; 
                }

                if (targetPos > curr[0]) {
                    let count = targetPos - curr[0] + 1;
                    let duration = curr[2] - curr[1];
                    let partDuration = duration / count;
                    for (let j = 0; j < count; j++) {
                        fixedSegments.push([
                            curr[0] + j,
                            curr[1] + j * partDuration,
                            curr[1] + (j + 1) * partDuration
                        ]);
                    }
                } else {
                    fixedSegments.push(curr);
                }
            }
            return fixedSegments;
        }

        // --- Audio & Highlight Logic (Karaoke Sempurna Quran.com 60FPS) ---
        state.audioElement.addEventListener('ended', handleAudioEnded);

        function updateHighlight() {
            if (!state.isPlaying || state.isPaused) return;

            let activePositions = [];

            if (state.useQuranComData && state.currentSegments) {
                const currentTimeMs = state.audioElement.currentTime * 1000;
                let segIndex = -1;

                // Cari segmen kata aktif
                for (let i = 0; i < state.currentSegments.length; i++) {
                    if (currentTimeMs >= state.currentSegments[i][1] && currentTimeMs <= state.currentSegments[i][2]) {
                        segIndex = i;
                        break;
                    }
                }

                if (segIndex !== -1) {
                    activePositions.push(state.currentSegments[segIndex][0]);
                } else {
                    // Berada di jeda antar kata atau trailing silence
                    for (let i = state.currentSegments.length - 1; i >= 0; i--) {
                        if (currentTimeMs > state.currentSegments[i][2]) {
                            activePositions.push(state.currentSegments[i][0]);
                            break;
                        }
                    }
                    if (activePositions.length === 0 && state.currentSegments[0]) {
                        // Belum mencapai audio pertama
                        activePositions.push(state.currentSegments[0][0]);
                    }
                }
            } else {
                // FALLBACK MODE (Equran)
                if (state.audioElement.duration && state.totalWords > 0) {
                    const progress = state.audioElement.currentTime / state.audioElement.duration;
                    let p = Math.floor(progress * state.totalWords);
                    
                    if (p >= state.totalWords - 1) p = state.totalWords - 2;
                    if (p < 0) p = 0;
                    
                    activePositions.push(p);
                }
            }

            // Bersihkan highlight yang tidak aktif
            document.querySelectorAll('.word-span.highlighted').forEach(el => {
                let idNum = parseInt(el.id.replace('word-', ''));
                if (!activePositions.includes(idNum)) {
                    el.classList.remove('highlighted');
                }
            });

            // Nyalakan highlight yang aktif
            activePositions.forEach(pos => {
                const span = document.getElementById(`word-${pos}`);
                if (span && !span.classList.contains('highlighted')) {
                    span.classList.add('highlighted');
                }
            });

            animationFrameId = requestAnimationFrame(updateHighlight);
        }
        
        state.audioElement.addEventListener('error', (e) => {
            if (!state.isPlaying) return;
            const mediaError = state.audioElement.error;
            let detail = mediaError ? ` (Kode: ${mediaError.code})` : "";
            
            // JIKA QURAN.COM GAGAL, BERALIH OTOMATIS KE EQURAN
            if (state.useQuranComData && state.currentFallbackUrl) {
                console.warn("Quran.com audio failed. Switching to equran.id fallback...");
                state.useQuranComData = false;
                
                let wordSpans = document.querySelectorAll('.word-span');
                wordSpans.forEach((span, i) => { span.id = `word-${i}`; });
                state.totalWords = wordSpans.length;

                state.audioElement.src = state.currentFallbackUrl;
                state.audioElement.load();
                
                const playPromise = state.audioElement.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        if (animationFrameId) cancelAnimationFrame(animationFrameId);
                        animationFrameId = requestAnimationFrame(updateHighlight);
                    }).catch(err => {
                        if (err.name !== 'AbortError') {
                            triggerErrorSkip(detail);
                        }
                    });
                }
                return;
            }
            
            triggerErrorSkip(detail);
        });

        function triggerErrorSkip(detail) {
            showError(`Gagal memutar audio ayat ${state.currentAyahPlaying}${detail}. Melompat ke ayat berikutnya...`);
            setTimeout(() => { if (state.isPlaying) handleAudioEnded(); }, 2000);
        }

        async function startMemorization() {
            if (!state.currentSurahData) return;

            const start = parseInt(els.startAyah.value);
            const end = parseInt(els.endAyah.value);
            let repeat = parseInt(els.repeatCount.value);

            if (isNaN(start) || isNaN(end)) {
                showModal('warning', 'Perhatian', 'Silakan isi rentang ayat dengan benar.');
                return;
            }
            if (isNaN(repeat) || repeat < 1) repeat = 1;
            if (repeat > 100) repeat = 100;
            els.repeatCount.value = repeat;

            els.setupFormArea.classList.add('collapsed');

            const originalBtnHtml = els.btnPlay.innerHTML;
            els.btnPlay.innerHTML = '<i class="ph-bold ph-spinner-gap spin-icon"></i> Mengambil Data...';
            els.btnPlay.disabled = true;

            try {
                const qariValues = els.qariSelect.value.split('|');
                const quranComQariId = qariValues[1];
                const surahId = state.selectedSurahNumber;
                
                const response = await fetch(`https://api.quran.com/api/v4/recitations/${quranComQariId}/by_chapter/${surahId}`);
                if (response.ok) {
                    const result = await response.json();
                    state.quranComAudioData = result.audio_files;
                } else {
                    state.quranComAudioData = null;
                }
            } catch (err) {
                console.warn("Gagal pre-fetch audio chapter", err);
                state.quranComAudioData = null; 
            }

            state.startAyah = start;
            state.endAyah = end;
            state.targetRepeat = repeat;
            state.currentRepeat = 1;
            state.currentAyahPlaying = start;
            state.isPlaying = true;
            state.isPaused = false;

            els.btnPlay.innerHTML = originalBtnHtml; 
            els.btnPlay.disabled = false;
            
            els.btnPlay.classList.add('hidden');
            els.btnPause.classList.remove('hidden');
            els.btnStop.classList.remove('hidden');
            
            els.surahSearchInput.disabled = true;
            els.startAyah.disabled = true;
            els.endAyah.disabled = true;
            els.repeatCount.disabled = true;
            els.qariSelect.disabled = true;

            els.playerArea.classList.remove('hidden');
            els.lblTotalRepeat.textContent = state.targetRepeat;
            els.lblSurahName.textContent = state.currentSurahData.name_simple;

            playCurrentAyah();
        }

        async function playCurrentAyah() {
            if (!state.isPlaying) return;

            hideError(); 
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            els.teksArab.innerHTML = '';
            els.teksIndonesia.textContent = 'Memuat ayat...';

            els.lblCurrentRepeat.textContent = state.currentRepeat;
            els.lblCurrentAyah.textContent = state.currentAyahPlaying;
            els.lblAyahNumberInText.textContent = state.currentAyahPlaying;

            const verseKey = `${state.selectedSurahNumber}:${state.currentAyahPlaying}`;
            let audioUrl = "";
            state.currentSegments = null; 
            state.useQuranComData = false;

            const qariValues = els.qariSelect.value.split('|');
            const equranQariId = qariValues[0];
            const quranComQariId = qariValues[1];

            els.btnPause.innerHTML = '<i class="ph-bold ph-spinner-gap spin-icon"></i> Menyiapkan...';

            // MENGAMBIL TEKS ARAB & TERJEMAHAN DARI QURAN.COM
            try {
                const response = await fetch(`https://api.quran.com/api/v4/verses/by_key/${verseKey}?language=id&words=true&word_fields=text_uthmani,char_type_name&translations=33&audio=${quranComQariId}`);
                if(response.ok) {
                    const data = await response.json();
                    if (data.verse && data.verse.words) {
                        
                        let spokenWords = data.verse.words.filter(w => w.char_type_name !== 'end');
                        if (spokenWords.length === 0) spokenWords = data.verse.words.slice(0, -1);
                        
                        state.lastSpokenPos = Math.max(...spokenWords.map(w => w.position));
                        state.totalWords = Math.max(...data.verse.words.map(w => w.position));

                        els.teksArab.innerHTML = data.verse.words.map(w => 
                            `<span id="word-${w.position}" class="word-span">${w.text_uthmani}</span>`
                        ).join(' ');

                        if (data.verse.translations && data.verse.translations.length > 0) {
                            els.teksIndonesia.innerHTML = data.verse.translations[0].text.replace(/<[^>]*>?/gm, '');
                        }

                        let audioData = null;
                        if (data.verse.audio && data.verse.audio.url) {
                            audioData = data.verse.audio;
                        } else if (state.quranComAudioData) {
                            audioData = state.quranComAudioData.find(a => a.verse_key === verseKey);
                        }

                        if (audioData && audioData.url) {
                            audioUrl = audioData.url;
                            if (audioUrl.startsWith('//')) audioUrl = 'https:' + audioUrl;
                            else if (!audioUrl.startsWith('http')) audioUrl = 'https://verses.quran.com/' + audioUrl;
                            
                            if (audioData.segments && audioData.segments.length > 0) {
                                state.currentSegments = interpolateMissingSegments(audioData.segments, state.lastSpokenPos);
                                state.useQuranComData = true;
                                state.currentAudioSource = 'quran.com';
                            }
                        }
                    }
                }
            } catch (err) {
                console.warn("Gagal fetch quran.com", err);
            }

            // FALLBACK EQURAN (Jika Quran.com gagal)
            if (!state.useQuranComData) {
                try {
                    const eqResp = await fetch(`https://equran.id/api/v2/surat/${state.selectedSurahNumber}`);
                    const eqData = await eqResp.json();
                    const ayahData = eqData.data.ayat[state.currentAyahPlaying - 1];
                    
                    if (ayahData) {
                        const arabicWords = ayahData.teksArab.trim().split(/\s+/);
                        state.totalWords = arabicWords.length;
                        
                        els.teksArab.innerHTML = arabicWords.map((w, index) => `<span id="word-${index}" class="word-span">${w}</span>`).join(' ');
                        els.teksIndonesia.textContent = ayahData.teksIndonesia;
                        
                        audioUrl = ayahData.audio[equranQariId] || Object.values(ayahData.audio)[0];
                        if (audioUrl) audioUrl = audioUrl.replace(/^http:\/\//i, 'https://');
                        
                        state.currentFallbackUrl = audioUrl;
                        state.currentAudioSource = 'equran';
                    }
                } catch (e) {
                    console.error("Gagal fallback", e);
                }
            }
            
            els.btnPause.className = 'btn btn-warning';
            els.btnPause.innerHTML = '<i class="ph-fill ph-pause-circle"></i> Jeda';
            
            if (!audioUrl) {
                showError("Gagal menemukan link audio untuk ayat ini.");
                setTimeout(() => { if (state.isPlaying) handleAudioEnded(); }, 2000);
                return;
            }

            state.audioElement.src = audioUrl;
            state.audioElement.load(); 
            
            const playPromise = state.audioElement.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    animationFrameId = requestAnimationFrame(updateHighlight);
                }).catch(e => {
                    if (e.name === 'AbortError') return; 
                    console.error("Play Promise error:", e);
                    if (e.name === 'NotAllowedError') {
                        state.isPaused = true;
                        els.btnPause.className = 'btn btn-info';
                        els.btnPause.innerHTML = '<i class="ph-fill ph-play-circle"></i> Mulai Audio';
                        showError(`Browser memblokir pemutaran otomatis. Klik tombol "Mulai Audio" untuk melanjutkan.`);
                    }
                });
            }
        }

        function handleAudioEnded() {
            if (!state.isPlaying) return;

            if (state.currentAyahPlaying < state.endAyah) {
                state.currentAyahPlaying++;
                playCurrentAyah();
            } else {
                if (state.currentRepeat < state.targetRepeat) {
                    state.currentRepeat++;
                    state.currentAyahPlaying = state.startAyah;
                    setTimeout(playCurrentAyah, 1000); 
                } else {
                    finishMemorization();
                }
            }
        }

        function stopMemorization() {
            state.isPlaying = false;
            state.isPaused = false;
            state.audioElement.pause();
            state.audioElement.currentTime = 0;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            resetUIAfterPlay();
        }

        function finishMemorization() {
            state.isPlaying = false;
            state.audioElement.pause();
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            showModal('success', 'Alhamdulillah!', 'Sesi hafalan telah selesai.', () => {
                resetUIAfterPlay();
            });
        }

        function resetUIAfterPlay() {
            els.btnPlay.classList.remove('hidden');
            els.btnPause.classList.add('hidden');
            els.btnStop.classList.add('hidden');
            els.setupFormArea.classList.remove('collapsed');
            els.surahSearchInput.disabled = false;
            els.startAyah.disabled = false;
            els.endAyah.disabled = false;
            els.repeatCount.disabled = false;
            els.qariSelect.disabled = false;
        }

        // --- Helper Functions ---
        function populateAyahInputs(totalAyah) {
            els.startAyah.min = 1;
            els.startAyah.max = totalAyah;
            els.startAyah.value = 1;
            els.endAyah.min = 1;
            els.endAyah.max = totalAyah;
            els.endAyah.value = totalAyah;

            els.ayahOptions.innerHTML = '';
            for (let i = 1; i <= totalAyah; i++) {
                const option = document.createElement('option');
                option.value = i;
                els.ayahOptions.appendChild(option);
            }
        }

        function showError(msg) {
            els.statusMessage.textContent = msg;
            els.statusMessage.classList.remove('hidden');
        }

        function hideError() {
            els.statusMessage.classList.add('hidden');
        }

        // Start App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
